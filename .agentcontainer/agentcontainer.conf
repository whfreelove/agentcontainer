# Agentcontainer Configuration
# Generated by agentcontainer init

# Project identity
PROJECT_NAME="agentcontainer"
WORKSPACE_FOLDER="/workspaces/agentcontainer"

# Base container image
BASE_IMAGE="mcr.microsoft.com/devcontainers/cpp:1-ubuntu-24.04"

# AI agents (space-separated): claude-code, opencode
AGENTS="claude-code"

# Devcontainer features (space-separated full URIs)
# Example: "ghcr.io/devcontainers/features/python:1 ghcr.io/devcontainers/features/node:1"
FEATURES="ghcr.io/devcontainers/features/nix:1"

# Setup script to run (path relative to repo root)
SETUP_SCRIPT=""

# Resource limits
MEMORY_LIMIT="4g"
CPU_LIMIT="2"
PID_LIMIT="500"

# Platform-specific
# macOS runtime: auto, apple-container, lima, docker
MACOS_RUNTIME="auto"
# Override auto-detection (docker, podman, nerdctl, lima)
CONTAINER_RUNTIME=""
