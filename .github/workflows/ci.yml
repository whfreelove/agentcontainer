name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────
  # Job 1: Lint — ShellCheck + bash -n (fast gate)
  # ─────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Collect scripts
        id: scripts
        run: |
          # bin/agentcontainer + all .sh files under lib/
          scripts="bin/agentcontainer"
          for f in $(find lib -name '*.sh' -type f | sort); do
            scripts="$scripts $f"
          done
          echo "files=$scripts" >> "$GITHUB_OUTPUT"

      - name: ShellCheck
        run: shellcheck -x -s bash --severity=warning ${{ steps.scripts.outputs.files }}

      - name: Bash syntax check (bash -n)
        run: |
          for f in ${{ steps.scripts.outputs.files }}; do
            echo "Checking $f..."
            bash -n "$f"
          done

  # ─────────────────────────────────────────────────────────
  # Job 2: Linux integration tests — runtime × arch matrix
  # ─────────────────────────────────────────────────────────
  test-linux:
    name: "Linux · ${{ matrix.runtime }} · ${{ matrix.arch }}"
    needs: lint
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Docker — pre-installed on both runner types
          - runner: ubuntu-latest
            runtime: docker
            arch: amd64
          - runner: ubuntu-24.04-arm
            runtime: docker
            arch: arm64

          # nerdctl — installed from nerdctl-full tarball
          - runner: ubuntu-latest
            runtime: nerdctl
            arch: amd64
          - runner: ubuntu-24.04-arm
            runtime: nerdctl
            arch: arm64

          # Podman — installed via apt
          - runner: ubuntu-latest
            runtime: podman
            arch: amd64
          - runner: ubuntu-24.04-arm
            runtime: podman
            arch: arm64

    env:
      CONTAINER_RUNTIME: ${{ matrix.runtime }}

    steps:
      - uses: actions/checkout@v4

      - name: Add agentcontainer to PATH
        run: echo "${{ github.workspace }}/bin" >> "$GITHUB_PATH"

      - name: Install devcontainer CLI and dependencies
        run: |
          sudo npm install -g @devcontainers/cli
          sudo apt-get update && sudo apt-get install -y jq gettext-base

      # ── Runtime setup ──────────────────────────────────
      - name: Setup nerdctl
        if: matrix.runtime == 'nerdctl'
        run: |
          NERDCTL_VERSION="2.2.1"
          ARCH="${{ matrix.arch }}"
          # nerdctl-full tarball uses amd64/arm64
          TARBALL="nerdctl-full-${NERDCTL_VERSION}-linux-${ARCH}.tar.gz"
          URL="https://github.com/containerd/nerdctl/releases/download/v${NERDCTL_VERSION}/${TARBALL}"

          echo "Downloading nerdctl-full ${NERDCTL_VERSION} for ${ARCH}..."
          curl -fsSL "$URL" -o "/tmp/${TARBALL}"
          sudo tar Cxzf /usr/local "/tmp/${TARBALL}"

          # Stop Docker to avoid containerd conflicts
          sudo systemctl stop docker docker.socket || true

          # Reload systemd to discover nerdctl-full unit files
          sudo systemctl daemon-reload

          # Start containerd and wait for it to be ready
          sudo systemctl enable --now containerd
          echo "Waiting for containerd..."
          for i in $(seq 1 15); do
            if sudo ctr version &>/dev/null; then
              echo "containerd ready"
              break
            fi
            sleep 1
          done
          if ! sudo ctr version &>/dev/null; then
            echo "ERROR: containerd not ready after 15s"
            sudo journalctl -u containerd --no-pager -n 50
            exit 1
          fi

          # Start buildkitd (required for nerdctl build)
          if systemctl list-unit-files buildkit.service | grep -q buildkit.service; then
            sudo systemctl enable --now buildkit
          else
            echo "Starting buildkitd manually..."
            sudo buildkitd > /tmp/buildkitd.log 2>&1 &
            disown
          fi

          # Wait for buildkitd socket
          echo "Waiting for buildkitd..."
          for i in $(seq 1 30); do
            if [ -S /run/buildkit/buildkitd.sock ]; then
              echo "buildkitd ready"
              break
            fi
            sleep 1
          done
          if [ ! -S /run/buildkit/buildkitd.sock ]; then
            echo "ERROR: buildkitd socket not found after 30s"
            exit 1
          fi

          # Verify
          sudo nerdctl version
          sudo nerdctl info

      - name: Setup Podman
        if: matrix.runtime == 'podman'
        run: |
          sudo apt-get update && sudo apt-get install -y podman
          # Enable rootful Podman socket for devcontainer CLI compatibility
          sudo systemctl enable --now podman.socket
          podman version
          sudo podman version

      # ── Integration test lifecycle ─────────────────────
      # Each phase is a separate step because shell.sh uses exec,
      # which replaces the process. Separate steps ensure subsequent
      # phases still execute.

      - name: "Test: init"
        run: |
          # Create a temporary project directory for the test
          mkdir -p /tmp/ci-test-project && cd /tmp/ci-test-project
          if [ "${{ matrix.runtime }}" = "docker" ]; then
            agentcontainer init --agent claude-code --exec claude --force
          else
            sudo -E env "PATH=$PATH" "$(which agentcontainer)" init --agent claude-code --exec claude --force
          fi

      - name: "Test: build"
        run: |
          cd /tmp/ci-test-project
          if [ "${{ matrix.runtime }}" = "docker" ]; then
            agentcontainer build
          else
            sudo -E env "PATH=$PATH" "$(which agentcontainer)" build
          fi

      - name: "Test: up"
        run: |
          cd /tmp/ci-test-project
          if [ "${{ matrix.runtime }}" = "docker" ]; then
            agentcontainer up
          else
            sudo -E env "PATH=$PATH" "$(which agentcontainer)" up
          fi

      - name: "Test: shell"
        run: |
          cd /tmp/ci-test-project
          if [ "${{ matrix.runtime }}" = "docker" ]; then
            agentcontainer shell echo "agentcontainer-ci-test"
          else
            sudo -E env "PATH=$PATH" "$(which agentcontainer)" shell echo "agentcontainer-ci-test"
          fi

      - name: "Test: stop"
        if: always()
        run: |
          cd /tmp/ci-test-project 2>/dev/null || exit 0
          if [ "${{ matrix.runtime }}" = "docker" ]; then
            agentcontainer stop || true
          else
            sudo -E env "PATH=$PATH" "$(which agentcontainer)" stop || true
          fi

      - name: "Test: down"
        if: always()
        run: |
          cd /tmp/ci-test-project 2>/dev/null || exit 0
          if [ "${{ matrix.runtime }}" = "docker" ]; then
            agentcontainer down || true
          else
            sudo -E env "PATH=$PATH" "$(which agentcontainer)" down || true
          fi

      - name: Dump buildkitd/containerd logs on failure
        if: failure() && matrix.runtime == 'nerdctl'
        run: |
          echo "=== buildkitd log file ==="
          cat /tmp/buildkitd.log 2>/dev/null || echo "(no log file)"
          echo "=== buildkit journald ==="
          sudo journalctl -u buildkit --no-pager -n 50 2>/dev/null || true
          echo "=== containerd journald ==="
          sudo journalctl -u containerd --no-pager -n 50 2>/dev/null || true

  # ─────────────────────────────────────────────────────────
  # Job 3: macOS — Apple Container with fallback
  # ─────────────────────────────────────────────────────────
  test-macos:
    name: macOS · Apple Container
    needs: lint
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Add agentcontainer to PATH
        run: echo "${{ github.workspace }}/bin" >> "$GITHUB_PATH"

      - name: Install ShellCheck
        run: brew install shellcheck

      - name: Install Bash 5 (for syntax testing alongside system Bash 3.2)
        run: brew install bash

      - name: ShellCheck
        run: |
          scripts="bin/agentcontainer"
          for f in $(find lib -name '*.sh' -type f | sort); do
            scripts="$scripts $f"
          done
          shellcheck -x -s bash --severity=warning $scripts

      - name: Bash syntax check (system Bash 3.2)
        run: |
          echo "Using: $(/bin/bash --version | head -1)"
          for f in bin/agentcontainer $(find lib -name '*.sh' -type f | sort); do
            echo "Checking $f..."
            /bin/bash -n "$f"
          done

      - name: Bash syntax check (Homebrew Bash 5.x)
        run: |
          BASH5="$(brew --prefix)/bin/bash"
          echo "Using: $($BASH5 --version | head -1)"
          for f in bin/agentcontainer $(find lib -name '*.sh' -type f | sort); do
            echo "Checking $f..."
            $BASH5 -n "$f"
          done

      - name: Unit test — detect_platform()
        run: |
          # Source the detection library and verify macOS detection
          source lib/platform/detect.sh
          platform="$(detect_platform)"
          echo "Detected platform: $platform"
          if [ "$platform" != "darwin" ]; then
            echo "FAIL: expected 'darwin', got '$platform'"
            exit 1
          fi
          echo "PASS: platform detection correct"

      - name: Install Apple Container CLI
        run: brew install container

      - name: Attempt to start Apple Container builder
        id: builder
        continue-on-error: true
        timeout-minutes: 2
        run: |
          # Apple Container may be blocked by nested virtualization on GHA runners
          if container builder start 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "Apple Container builder started successfully"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Apple Container builder could not start (likely nested virt restriction)"
          fi

      - name: Install devcontainer CLI and dependencies
        if: steps.builder.outputs.available == 'true'
        run: |
          npm install -g @devcontainers/cli
          brew install gettext
          # gettext is keg-only; add its bin to PATH instead of force-linking
          echo "$(brew --prefix gettext)/bin" >> "$GITHUB_PATH"

      - name: "Test: init"
        if: steps.builder.outputs.available == 'true'
        run: |
          mkdir -p /tmp/ci-test-project && cd /tmp/ci-test-project
          agentcontainer init --agent claude-code --exec claude --force

      - name: "Test: build"
        if: steps.builder.outputs.available == 'true'
        run: cd /tmp/ci-test-project && agentcontainer build

      - name: "Test: up"
        if: steps.builder.outputs.available == 'true'
        run: cd /tmp/ci-test-project && agentcontainer up

      - name: "Test: shell"
        if: steps.builder.outputs.available == 'true'
        run: cd /tmp/ci-test-project && agentcontainer shell echo "agentcontainer-ci-test"

      - name: "Test: stop"
        if: always() && steps.builder.outputs.available == 'true'
        run: |
          cd /tmp/ci-test-project 2>/dev/null || exit 0
          agentcontainer stop || true

      - name: "Test: down"
        if: always() && steps.builder.outputs.available == 'true'
        run: |
          cd /tmp/ci-test-project 2>/dev/null || exit 0
          agentcontainer down || true

  # ─────────────────────────────────────────────────────────
  # Job 4: Windows — lint only
  # ─────────────────────────────────────────────────────────
  # Windows GitHub-hosted runners only support Windows containers.
  # Linux containers require Hyper-V + WSL2 nested virtualization,
  # which is disabled on GHA VMs. Docker is pre-installed but cannot
  # run Linux images. Podman and nerdctl are not available.
  # Therefore, we limit Windows to lint and syntax validation.
  test-windows:
    name: Windows · lint
    needs: lint
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          SHELLCHECK_VERSION="0.10.0"
          URL="https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.zip"
          curl -fsSL "$URL" -o /tmp/shellcheck.zip
          unzip -o /tmp/shellcheck.zip -d /tmp/shellcheck
          # Zip extracts into versioned subdirectory containing shellcheck.exe
          echo "/tmp/shellcheck/shellcheck-v${SHELLCHECK_VERSION}" >> "$GITHUB_PATH"

      - name: Collect scripts
        id: scripts
        run: |
          scripts="bin/agentcontainer"
          for f in $(find lib -name '*.sh' -type f | sort); do
            scripts="$scripts $f"
          done
          echo "files=$scripts" >> "$GITHUB_OUTPUT"

      - name: ShellCheck
        run: shellcheck -x -s bash --severity=warning ${{ steps.scripts.outputs.files }}

      - name: Bash syntax check (bash -n)
        run: |
          for f in ${{ steps.scripts.outputs.files }}; do
            echo "Checking $f..."
            bash -n "$f"
          done
